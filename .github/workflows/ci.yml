name: CI - BovWeight API

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, xml, bcmath
          coverage: none

      - name: Instalar dependencias con Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Generar clave de aplicación
        run: php artisan key:generate

      - name: Ejecutar pruebas con PHPUnit
        run: php artisan test